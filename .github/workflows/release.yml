name: Build and Release AppImage

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version and push
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT=$(python3 -c "
          import re
          content = open('version.py').read()
          print(re.search(r'__version__\s*=\s*[\'\"](.*?)[\'\"]', content).group(1))
          ")

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          echo "__version__ = \"$NEW_VERSION\"" > version.py

          git add version.py
          git commit -m "chore: bump version to $NEW_VERSION"
          git push

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          pip install --upgrade pip
          pip install pyinstaller pyinstaller-hooks-contrib PyQt6 omgifol Pillow

      - name: Build with PyInstaller
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          pyinstaller wad-evoker.spec

      - name: Package as AppImage
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          APPIMAGE_NAME="WadEvoker-${VERSION}-x86_64.AppImage"

          sudo apt-get install -y libfuse2

          mkdir -p AppDir
          cp -r dist/wad-evoker/* AppDir/

          cat > AppDir/AppRun << 'APPRUN_EOF'
          #!/bin/bash
          APPDIR="$(dirname "$(readlink -f "$0")")"
          exec "$APPDIR/wad-evoker" "$@"
          APPRUN_EOF
          chmod +x AppDir/AppRun

          cp wad-evoker.desktop AppDir/wad-evoker.desktop

          python3 - << 'ICON_EOF'
          from PIL import Image, ImageDraw
          img = Image.new("RGBA", (256, 256), (20, 20, 20, 255))
          d = ImageDraw.Draw(img)
          d.rectangle([8, 8, 247, 247], outline=(204, 34, 0, 255), width=10)
          d.rectangle([38, 38, 217, 217], fill=(139, 0, 0, 255))
          img.save("AppDir/wad-evoker.png")
          ICON_EOF

          wget -q -O appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir "$APPIMAGE_NAME"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Wad Evoker ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: WadEvoker-*-x86_64.AppImage
